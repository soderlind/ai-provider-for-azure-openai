name: Manually Build release zip

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy'
        required: true
        type: string
        default: ''

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build JavaScript
        run: npm run build

      - name: Configure Composer GitHub auth
        run: composer config --global github-oauth.github.com ${{ github.token }}

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Stage release files
        run: |
          mkdir -p /tmp/ai-provider-for-azure-openai
          rsync -a \
            --exclude-from='.distignore' \
            . /tmp/ai-provider-for-azure-openai/

      - name: Archive Release
        working-directory: /tmp
        run: zip -r ${{ github.workspace }}/ai-provider-for-azure-openai.zip ai-provider-for-azure-openai/

      - name: Verify Archive Contents
        run: |
          echo "Listing ai-provider-for-azure-openai.zip entries:"
          unzip -l ai-provider-for-azure-openai.zip || { echo "Failed to list zip contents"; exit 1; }
          echo "Total files: $(unzip -l ai-provider-for-azure-openai.zip | awk 'END{print $2}')"

          if unzip -l ai-provider-for-azure-openai.zip | grep -q "ai-provider-for-azure-openai/.distignore"; then
            echo "✗ ERROR: .distignore must not be included in release zip"
            exit 1
          fi

          if unzip -l ai-provider-for-azure-openai.zip | grep -q "ai-provider-for-azure-openai/vendor/"; then
            if ! unzip -l ai-provider-for-azure-openai.zip | grep -q "ai-provider-for-azure-openai/composer.json"; then
              echo "✗ ERROR: composer.json is required when vendor/ is included"
              exit 1
            fi
          fi

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" ai-provider-for-azure-openai.zip --clobber
          else
            gh release create "$TAG" ai-provider-for-azure-openai.zip --title "$TAG" --generate-notes
          fi
