name: Manually Build release zip

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy'
        required: true
        type: string
        default: ''

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Composer GitHub auth
        run: composer config --global github-oauth.github.com ${{ github.token }}

      - name: Build plugin
        run: composer install --no-dev --optimize-autoloader

      - name: Stage release files
        run: |
          mkdir -p /tmp/ai-provider-for-azure-openai
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitattributes' \
            --exclude='.gitignore' \
            --exclude='.phpunit.cache/' \
            --exclude='node_modules/' \
            --exclude='tests/' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='phpunit.xml.dist' \
            --exclude='phpcs.xml' \
            --exclude='README.md' \
            --exclude='.editorconfig' \
            --exclude='vendor/bin/' \
            . /tmp/ai-provider-for-azure-openai/

      - name: Archive Release
        working-directory: /tmp
        run: zip -r ${{ github.workspace }}/ai-provider-for-azure-openai.zip ai-provider-for-azure-openai/

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" ai-provider-for-azure-openai.zip --clobber
          else
            gh release create "$TAG" ai-provider-for-azure-openai.zip --title "$TAG" --generate-notes
          fi
