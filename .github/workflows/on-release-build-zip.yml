name: On Release, Build release zip

on:
  release:
    types: [published]

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build JavaScript
        run: npm run build

      - name: Configure Composer GitHub auth
        run: composer config --global github-oauth.github.com ${{ github.token }}

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Stage release files
        run: |
          mkdir -p /tmp/ai-provider-for-azure-openai
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitattributes' \
            --exclude='.gitignore' \
            --exclude='.phpunit.cache/' \
            --exclude='node_modules/' \
            --exclude='tests/' \
            --exclude='src/js/' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='webpack.config.js' \
            --exclude='i18n-map.json' \
            --exclude='phpunit.xml.dist' \
            --exclude='phpcs.xml' \
            --exclude='README.md' \
            --exclude='.editorconfig' \
            --exclude='vendor/bin/' \
            --exclude='languages/.gitkeep' \
            . /tmp/ai-provider-for-azure-openai/

      - name: Archive Release
        working-directory: /tmp
        run: zip -r ${{ github.workspace }}/ai-provider-for-azure-openai.zip ai-provider-for-azure-openai/

      - name: Verify Archive Contents
        run: |
          echo "Listing ai-provider-for-azure-openai.zip entries:"
          unzip -l ai-provider-for-azure-openai.zip || { echo "Failed to list zip contents"; exit 1; }
          echo "Total files: $(unzip -l ai-provider-for-azure-openai.zip | awk 'END{print $2}')"

          # Verify Plugin Update Checker is included (required dependency)
          if unzip -l ai-provider-for-azure-openai.zip | grep -q "vendor/yahnis-elsts/plugin-update-checker"; then
            echo "✓ Plugin Update Checker is included"
          else
            echo "✗ ERROR: Plugin Update Checker is missing from the release!"
            exit 1
          fi

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            ai-provider-for-azure-openai.zip \
            --clobber
